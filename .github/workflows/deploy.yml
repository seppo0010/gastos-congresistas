name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: github-pages-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build
        env:
          GITHUB_PAGES_BASE: ${{ github.repository == 'seppo0010/gastos-congresistas' && '/' || format('/{0}/', github.event.repository.name) }}
          SITE_PATH_PREFIX: ${{ github.repository == 'seppo0010/gastos-congresistas' && '/' || format('/{0}/', github.event.repository.name) }}
        run: npm run build
      - name: Remove production CNAME on forks
        if: github.repository != 'seppo0010/gastos-congresistas'
        run: rm -f dist/CNAME
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
